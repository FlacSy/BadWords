name: Formatter

on:
  pull_request:
  push:
    branches: [main, develop]
    tags: ["v*"]

permissions:
  contents: read

jobs:
  format:
    name: Formatter check (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check .
