<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BadWords WASM - Profanity Filter Demo</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.5rem; }
    textarea { width: 100%; min-height: 80px; padding: 0.5rem; margin: 0.5rem 0; }
    button { padding: 0.5rem 1rem; cursor: pointer; margin-right: 0.5rem; margin-bottom: 0.5rem; }
    .result { margin-top: 1rem; padding: 1rem; border-radius: 4px; }
    .clean { background: #d4edda; color: #155724; }
    .bad { background: #f8d7da; color: #721c24; }
    .censored { background: #fff3cd; color: #856404; }
  </style>
</head>
<body>
  <h1>BadWords WASM - Profanity Filter</h1>
  <p>Enter text to check for profanity. Supports English and Russian with homoglyph/transliteration detection.</p>

  <textarea id="input" placeholder="Type something...">Hello, this is a test. Some b4d w0rds here.</textarea>

  <div>
    <button id="check">Check</button>
    <button id="censor">Censor with *</button>
  </div>

  <div id="output"></div>

  <script type="module">
    // Запуск: из корня проекта — make wasm && npx serve . -p 3000
    // Или: cd examples/wasm/browser && npm start
    // Открыть: http://localhost:3000/examples/wasm/browser/
    import init, { ProfanityFilter } from '../../../rust/badwords-wasm/pkg/badwords_wasm.js';

    async function main() {
      try {
        await init();
        const filter = new ProfanityFilter();

        const input = document.getElementById('input');
        const output = document.getElementById('output');

        function showResult(className, text) {
          output.className = 'result ' + className;
          output.textContent = text;
        }

        document.getElementById('check').onclick = () => {
          const text = input.value;
          const isBad = filter.isBad(text);
          showResult(isBad ? 'bad' : 'clean', isBad ? 'Contains profanity!' : 'Text is clean.');
        };

        document.getElementById('censor').onclick = () => {
          const text = input.value;
          const censored = filter.censor(text, '*');
          showResult('censored', censored);
        };
      } catch (err) {
        document.getElementById('output').className = 'result bad';
        document.getElementById('output').textContent = 'Error: ' + (err.message || err);
        console.error(err);
      }
    }

    main();
  </script>
</body>
</html>
